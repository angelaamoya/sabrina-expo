        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="icon" href="media/img/favicon.svg">
        <link href="css/style.css" rel="stylesheet" type="text/css"> 
    </head>
    <body>
            <header class="header">
            <!-- Logo -->
            <a href="index.html" class="logo"><img src="./media/img/logo.svg" class="logo-nav"></a>

            <!-- Desktop menu -->
            <nav class="nav-desktop">
                <ul class="menu-desktop">
                    <li>
                        <a href="index.html">home</a>
                    </li>
                    <li>
                        <a href="gallery.html">gallery</a>
                    </li>
                    <li>
                        <a href="dates.html">tour dates</a>
                    </li>
                    <li>
                        <a href="tickets.html">tickets</a>
                    </li>
                </ul>
            </nav>

            <!-- Hamburger icon -->
            <input class="side-menu" type="checkbox" id="sideMenu" />
            <label class="icons-mobile" for="sideMenu">
                <i class="fa-solid fa-bars"></i>
                <i class="fa-solid fa-times"></i>
            </label>

            <!-- Menu mobile -->
            <nav class="nav-mobile">
                <ul class="menu-mobile">
                    <li>
                        <a href="index.html">home</a>
                    </li>
                    <li>
                        <a href="gallery.html">gallery</a>

                    <li>
                        <a href="tickets.html">tickets</a>
                    </li>
                </ul>
            </nav>
        </header>

        <div class="formulario">
        <section>
            <h1>Buy tour tickets</h1>
            <!-- Se añade la detección del evento Submit para llamar a la función comprar() cuando se pulse el botón -->
            <form onsubmit="return comprar()">
                <label for="nombre">Full Name:</label>
                <input type="text" id="nombre" placeholder="Write your name" required>
                <label for="correo">Email:</label>
                <input type="email" id="correo" placeholder="Email" required>
                <label for="exposicion">Exposición:</label>
                <!-- Se llama a la función costeTotal() cuando hay cambios en la exposición seleccionada -->
                <select id="exposicion" onchange="costeTotal()">
                    <option value="e1">Upper Bowl  - 60 €</option>
                    <option value="e2">Pit - 70 €</option>
                    <option value="e3">Lower Bowl - 100 €</option>
                </select>
                <label for="numero">Number of tickets:</label>
                <!-- Se llama a la función costeTotal() cuando hay cambios en el número de entradas -->
                <input type="number" id="numero" min="1" max="10" placeholder="Number of tickets" required onchange="costeTotal()">
                <p>Total cost: <span id="coste"></span></p>
                <input type="submit" value="Buy Tickets">
            </form>
        </section>
        <div id="modal">
            <div>
                <h2>Thanks for your purchase</h2>
                <ul>
                    <li>Name: <span id="nom"></span></li>
                    <li>Email: <span id="corr"></span></li>
                    <li>Ticket type: <span id="ex"></span></li>
                    <li>Number of tickets: <span id="num"></span></li>
                    <li>Total Cost: <span id="ct"></span></li>
                </ul>
                <!-- Se llama a la función cerrarVentana() cuando se pulsa el botón -->
                <button onclick="cerrarVentana()">Aceptar</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
